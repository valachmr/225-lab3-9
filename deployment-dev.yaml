apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  labels:
    app: flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: cithit/valachmr:latest   #<-----change this!!!!
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:                                      # ADDED: inject secrets as env vars
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: secret_key
            - name: FLASK_DEBUG                     # ADDED: explicitly disable debug mode
              value: "false"
            - name: DATABASE                        # ADDED: explicit DB path inside container
              value: "/app/demo.db"
          securityContext:                          # ADDED: lock down the container
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false           # kept false since SQLite needs to write

---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  type: LoadBalancer 
  loadBalancerIP: 10.48.228.123     #<-----change this!!!!                             
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  selector:
    app: flask